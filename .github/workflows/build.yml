name: Build Repo & Deploy Web

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. Build package repositories
  build-repo:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install toolchain and xpkg
        run: |
          pacman -Sy --noconfirm --needed rust cargo git openssl pkgconf
          cargo install --git https://github.com/xscriptor/xpkg --locked xpkg

      - name: Build x-release package (XBUILD)
        run: |
          cd packages/x-release
          ~/.cargo/bin/xpkg build -o /tmp/xpkg-out

      - name: Include xpm package artifact
        run: |
          set -euo pipefail

          latest_xpm="$(ls -1 packages/xpm/*.xp | sort -V | tail -n1)"
          [ -n "$latest_xpm" ] || { echo "No xpm .xp artifact found in packages/xpm"; exit 1; }

          cp "$latest_xpm" /tmp/xpkg-out/

      - name: Create repositories (pacman and xpm)
        run: |
          set -euo pipefail

          mkdir -p public/repo/x86_64 public/x/x86_64

          rm -f public/repo/x86_64/* public/x/x86_64/*

          pacman_pkg_count=0

          # Copy .xp packages to xpm endpoint
          for pkg in /tmp/xpkg-out/*.xp; do
            [ -e "$pkg" ] || { echo "No .xp packages produced"; exit 1; }
            base="$(basename "$pkg" .xp)"
            cp "$pkg" "public/x/x86_64/$base.xp"
          done

          # Copy only long-term stable pacman-facing packages
          for pkg in /tmp/xpkg-out/*.xp; do
            base="$(basename "$pkg" .xp)"
            case "$base" in
              x-release-*|xpm-*)
                cp "$pkg" "public/repo/x86_64/$base.pkg.tar.zst"
                pacman_pkg_count=$((pacman_pkg_count + 1))
                ;;
              *)
                ;;
            esac
          done

          [ "$pacman_pkg_count" -gt 0 ] || {
            echo "No x-release/xpm packages selected for pacman endpoint"
            exit 1
          }

          # Build xpm repository database
          (
            cd public/x/x86_64
            rm -f x.db* x.files* || true
            repo-add -n -R x.db.tar.gz *.xp
            rm -f x.db x.files
            cp x.db.tar.gz x.db
            cp x.files.tar.gz x.files
          )

          # Build pacman repository database
          (
            cd public/repo/x86_64
            rm -f x.db* x.files* || true
            repo-add -n -R x.db.tar.gz *.pkg.tar.zst
            rm -f x.db x.files
            cp x.db.tar.gz x.db
            cp x.files.tar.gz x.files
          )

          # Generate checksums for both endpoints
          for endpoint in public/x/x86_64 public/repo/x86_64; do
            (
              cd "$endpoint"
              sha256sum * > SHA256SUMS
            )
          done

      - name: Upload Repo Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-files
          path: public

  # 2. Build and deploy website
  deploy-web:
    needs: build-repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Repo Files
        uses: actions/download-artifact@v4
        with:
          name: repo-files
          path: public

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Install & Build Next.js
        run: |
          npm ci
          npm run build
          
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4