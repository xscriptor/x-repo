name: Build Repo & Deploy Web

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  GNUPGHOME: /tmp/gnupg

jobs:
  # 1. Build and sign package repositories
  build-repo:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install toolchain, xpkg and GnuPG
        run: |
          pacman -Sy --noconfirm --needed rust cargo git openssl pkgconf gnupg
          cargo install --git https://github.com/xscriptor/xpkg --locked xpkg

      - name: Build x-release package (XBUILD)
        run: |
          cd packages/x-release
          ~/.cargo/bin/xpkg build -o /tmp/xpkg-out

      - name: Include xpm package artifact
        run: |
          set -euo pipefail

          latest_xpm="$(ls -1 packages/xpm/*.xp | sort -V | tail -n1)"
          [ -n "$latest_xpm" ] || { echo "No xpm .xp artifact found in packages/xpm"; exit 1; }

          cp "$latest_xpm" /tmp/xpkg-out/

      - name: Import repository signing key and export public keyring
        env:
          X_REPO_GPG_PRIVATE_KEY_B64: ${{ secrets.X_REPO_GPG_PRIVATE_KEY_B64 }}
          X_REPO_GPG_KEY_FPR: ${{ secrets.X_REPO_GPG_KEY_FPR }}
        run: |
          set -euo pipefail

          [ -n "${X_REPO_GPG_PRIVATE_KEY_B64:-}" ] || {
            echo "Missing required secret: X_REPO_GPG_PRIVATE_KEY_B64"
            exit 1
          }

          [ -n "${X_REPO_GPG_KEY_FPR:-}" ] || {
            echo "Missing required secret: X_REPO_GPG_KEY_FPR"
            exit 1
          }

          install -d -m 700 "$GNUPGHOME"

          echo "$X_REPO_GPG_PRIVATE_KEY_B64" | base64 -d > /tmp/signing-private.key
          gpg --batch --import /tmp/signing-private.key >/dev/null

          imported_fpr="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1=="fpr"{print $10; exit}')"
          [ -n "$imported_fpr" ] || {
            echo "Could not read imported GPG key fingerprint"
            exit 1
          }

          if [ "$imported_fpr" != "$X_REPO_GPG_KEY_FPR" ]; then
            echo "Imported key fingerprint does not match expected fingerprint"
            echo "Expected: $X_REPO_GPG_KEY_FPR"
            echo "Got:      $imported_fpr"
            exit 1
          fi

          gpg --batch --export "$X_REPO_GPG_KEY_FPR" > /tmp/trustedkeys.gpg
          gpg --batch --armor --export "$X_REPO_GPG_KEY_FPR" > /tmp/signing.pub

          echo "X_REPO_SIGNING_FPR=$X_REPO_GPG_KEY_FPR" >> "$GITHUB_ENV"

      - name: Create and sign repositories (pacman and xpm)
        env:
          X_REPO_GPG_PASSPHRASE: ${{ secrets.X_REPO_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          [ -n "${X_REPO_SIGNING_FPR:-}" ] || {
            echo "Missing signing fingerprint from previous step"
            exit 1
          }

          mkdir -p public/repo/x86_64 public/x/x86_64

          rm -f public/repo/x86_64/* public/x/x86_64/*

          pacman_pkg_count=0

          sign_file() {
            local target="$1"
            local sig="${target}.sig"

            rm -f "$sig"

            gpg --batch --yes --no-tty --pinentry-mode loopback \
              --passphrase "${X_REPO_GPG_PASSPHRASE:-}" \
              --local-user "$X_REPO_SIGNING_FPR" \
              --digest-algo SHA512 \
              --detach-sign --output "$sig" "$target"
          }

          # Copy .xp packages to xpm endpoint
          for pkg in /tmp/xpkg-out/*.xp; do
            [ -e "$pkg" ] || { echo "No .xp packages produced"; exit 1; }
            base="$(basename "$pkg" .xp)"
            cp "$pkg" "public/x/x86_64/$base.xp"
          done

          # Copy only long-term stable pacman-facing packages
          for pkg in /tmp/xpkg-out/*.xp; do
            base="$(basename "$pkg" .xp)"
            case "$base" in
              x-release-*|xpm-*)
                cp "$pkg" "public/repo/x86_64/$base.pkg.tar.zst"
                pacman_pkg_count=$((pacman_pkg_count + 1))
                ;;
              *)
                ;;
            esac
          done

          [ "$pacman_pkg_count" -gt 0 ] || {
            echo "No x-release/xpm packages selected for pacman endpoint"
            exit 1
          }

          # Build xpm repository database
          (
            cd public/x/x86_64
            rm -f x.db* x.files* || true
            repo-add -n -R x.db.tar.gz *.xp
            rm -f x.db x.files
            cp x.db.tar.gz x.db
            cp x.files.tar.gz x.files
          )

          # Build pacman repository database
          (
            cd public/repo/x86_64
            rm -f x.db* x.files* || true
            repo-add -n -R x.db.tar.gz *.pkg.tar.zst
            rm -f x.db x.files
            cp x.db.tar.gz x.db
            cp x.files.tar.gz x.files
          )

          # Sign packages and repository metadata for both endpoints
          for endpoint in public/x/x86_64 public/repo/x86_64; do
            find "$endpoint" -maxdepth 1 -type f \
              \( -name "*.xp" -o -name "*.pkg.tar.zst" -o -name "x.db" -o -name "x.files" -o -name "x.db.tar.gz" -o -name "x.files.tar.gz" \) \
              -print0 | sort -z | while IFS= read -r -d '' file; do
                sign_file "$file"
              done

            cp /tmp/trustedkeys.gpg "$endpoint/trustedkeys.gpg"
            cp /tmp/signing.pub "$endpoint/signing.pub"

            (
              cd "$endpoint"
              sha256sum * > SHA256SUMS
            )

            sign_file "$endpoint/SHA256SUMS"
          done

      - name: Verify generated signatures in CI
        run: |
          set -euo pipefail

          verify_endpoint() {
            local endpoint="$1"

            gpgv \
              --keyring "$endpoint/trustedkeys.gpg" \
              "$endpoint/SHA256SUMS.sig" \
              "$endpoint/SHA256SUMS"

            while IFS= read -r sig; do
              target="${sig%.sig}"
              gpgv --keyring "$endpoint/trustedkeys.gpg" "$sig" "$target"
            done < <(find "$endpoint" -maxdepth 1 -type f -name "*.sig" ! -name "trustedkeys.gpg.sig" | sort)
          }

          verify_endpoint public/x/x86_64
          verify_endpoint public/repo/x86_64

      - name: Upload Repo Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-files
          path: public

  # 2. Build and deploy website
  deploy-web:
    needs: build-repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Repo Files
        uses: actions/download-artifact@v4
        with:
          name: repo-files
          path: public

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Install & Build Next.js
        run: |
          npm ci
          npm run build
          
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4